# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.yml  ·  Orchestra-Agent  ·  Hybrid LLM Edition
# ─────────────────────────────────────────────────────────────────────────────
# Total RAM budget  ≤ 1 GB (enforced at cgroup level):
#   streamlit   350 MB
#   api         500 MB
#   overhead    ~150 MB OS + Docker shim
#
# Secrets management:
#   1. Create a .env file (never commit):
#         GOOGLE_API_KEY=AIza...
#         OPENAI_API_KEY=sk-...      # optional fallback
#   2. docker compose --env-file .env up -d
#   3. Keys are injected at runtime — not baked into the image layer
#
# Engine priority (matches graph.py):
#   Gemini 1.5 Flash  → GOOGLE_API_KEY present   (recommended, free quota)
#   OpenAI GPT-4o-mini→ OPENAI_API_KEY present   (fallback)
#   Ollama Llama 3.2  → OLLAMA_HOST present       (local only)
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── FastAPI AI backend ──────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: orchestra_api
    command: >
      uvicorn api.main:app
        --host 0.0.0.0
        --port 8000
        --workers 1
        --loop asyncio
        --log-level warning
    ports:
      - "8000:8000"
    environment:
      - DATA_DIR=/data
      - LOG_DIR=/app/logs
      # ── LLM secrets — set in .env file, never hardcode here ──────────────
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}    # Gemini 1.5 Flash (primary)
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}    # GPT-4o-mini (fallback)
      - OLLAMA_HOST=${OLLAMA_HOST:-}          # e.g. http://host.docker.internal:11434
    volumes:
      - orchestra_data:/data
      - orchestra_logs:/app/logs
    deploy:
      resources:
        limits:
          memory: 500M          # hard cap — LangGraph + LLM client overhead
          cpus: "1.0"
        reservations:
          memory: 150M
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── Streamlit UI ────────────────────────────────────────────────────────────
  streamlit:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: orchestra_ui
    ports:
      - "8501:8501"
    environment:
      - DATA_DIR=/data
      - LOG_DIR=/app/logs
      - API_BASE_URL=http://api:8000
      # Pass same keys so sidebar can validate them without hitting the API
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OLLAMA_HOST=${OLLAMA_HOST:-}
    volumes:
      - orchestra_data:/data
      - orchestra_logs:/app/logs
    depends_on:
      api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 350M          # Streamlit + Pandas + Plotly
          cpus: "0.8"
        reservations:
          memory: 128M
    restart: unless-stopped

volumes:
  orchestra_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data

  orchestra_logs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./logs